<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>seeker alert Wallet Connect Demo</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 24px; max-width: 720px; }
      button { margin-right: 8px; margin-bottom: 8px; padding: 8px 12px; }
      pre { background: #f5f5f5; padding: 12px; border-radius: 8px; overflow: auto; }
      .warn { color: #a35c00; }
    </style>
  </head>
  <body>
    <h1>seeker alert 钱包连接 Demo</h1>
    <p>流程：连接 Phantom -> 获取 nonce -> 钱包签名 -> 获取 token</p>
    <p class="warn">仅演示签名登录，交易执行仍由后端策略引擎控制。</p>

    <button id="btnConnect">1) 连接钱包</button>
    <button id="btnLogin">2) 签名登录</button>
    <button id="btnCallRules">3) 调用 /api/rules</button>

    <pre id="log"></pre>

    <script>
      let walletAddress = '';
      let token = '';

      function log(v) {
        const el = document.getElementById('log');
        el.textContent = typeof v === 'string' ? v : JSON.stringify(v, null, 2);
      }

      function getPhantom() {
        const provider = window.phantom?.solana || window.solana;
        if (!provider || !provider.isPhantom) {
          throw new Error('未检测到 Phantom 钱包');
        }
        return provider;
      }

      document.getElementById('btnConnect').onclick = async () => {
        try {
          const provider = getPhantom();
          const resp = await provider.connect();
          walletAddress = resp.publicKey.toString();
          log({ walletAddress });
        } catch (e) {
          log({ error: String(e) });
        }
      };

      document.getElementById('btnLogin').onclick = async () => {
        try {
          if (!walletAddress) throw new Error('请先连接钱包');
          const provider = getPhantom();

          const nonceResp = await fetch(`/api/auth/nonce?wallet=${encodeURIComponent(walletAddress)}`);
          const nonceData = await nonceResp.json();
          if (!nonceResp.ok) throw new Error(JSON.stringify(nonceData));

          const encodedMessage = new TextEncoder().encode(nonceData.message);
          const signed = await provider.signMessage(encodedMessage, 'utf8');

          // Phantom returns Uint8Array signature, convert to base58 via backend helper route expectation.
          // We convert in browser using simple base58 alphabet encoder to avoid extra deps.
          const signatureBase58 = toBase58(signed.signature);

          const verifyResp = await fetch('/api/auth/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              wallet: walletAddress,
              nonce: nonceData.nonce,
              signature: signatureBase58
            })
          });
          const verifyData = await verifyResp.json();
          if (!verifyResp.ok) throw new Error(JSON.stringify(verifyData));

          token = verifyData.token;
          log({ walletAddress, token, expiresInSec: verifyData.expiresInSec });
        } catch (e) {
          log({ error: String(e) });
        }
      };

      document.getElementById('btnCallRules').onclick = async () => {
        try {
          if (!token) throw new Error('请先签名登录拿到 token');
          const resp = await fetch('/api/rules', {
            headers: { Authorization: `Bearer ${token}` }
          });
          const data = await resp.json();
          log(data);
        } catch (e) {
          log({ error: String(e) });
        }
      };

      function toBase58(bytes) {
        const alphabet = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
        const base = alphabet.length;
        if (!bytes || !bytes.length) return '';
        let digits = [0];
        for (let i = 0; i < bytes.length; i++) {
          let carry = bytes[i];
          for (let j = 0; j < digits.length; j++) {
            carry += digits[j] << 8;
            digits[j] = carry % base;
            carry = (carry / base) | 0;
          }
          while (carry) {
            digits.push(carry % base);
            carry = (carry / base) | 0;
          }
        }
        let result = '';
        for (let k = 0; k < bytes.length && bytes[k] === 0; k++) result += alphabet[0];
        for (let q = digits.length - 1; q >= 0; q--) result += alphabet[digits[q]];
        return result;
      }
    </script>
  </body>
</html>
